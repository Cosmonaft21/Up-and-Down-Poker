<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>
    <div class="picker-container">
        <div class="picker-wheel" id="wheel">
            <!-- Цифры добавятся через JS -->
        </div>
        <div class="highlight"></div>
    </div>
    <p style="text-align:center">Выбрано: <span id="result">-</span></p>
    <style>
        :root {
            --item-width: 60px; /* Ширина одного деления */
            --radius: 100px;    /* Глубина барабана */
        }

        .picker-container {
            position: relative;
            width: var(--item-width);
            height: 60px;
            perspective: 1000px;
            margin: 50px auto;
            touch-action: none; /* Отключаем стандартный скролл страницы при касании */
        }

        .picker-wheel {
            width: 100%;
            height: 100%;
            position: absolute;
            transform-style: preserve-3d;
            transition: transform 0.3s ease-out;
        }

        .picker-item {
            position: absolute;
            width: var(--item-width);
            height: 100%;
            line-height: 60px;
            text-align: center;
            font-size: 28px;
            font-weight: bold;
            font-family: sans-serif;
            backface-visibility: hidden;
            background: white;
        }

        .highlight {
            position: absolute;
            left: 0;
            width: var(--item-width);
            height: 100%;
            border-left: 2px solid #007AFF;
            border-right: 2px solid #007AFF;
            pointer-events: none;
            z-index: 10;
        }
    </style>
    <script>
        const wheel = document.getElementById('wheel');
        const resultDisplay = document.getElementById('result');
        const itemsCount = 11;
        const angleStep = 360 / itemsCount;

        let currentIdx = 0;
        let isStarted = false;
        let startX = 0;
        let currentRotation = 0;

        // Инициализация элементов (теперь rotateY)
        for (let i = 0; i < itemsCount; i++) {
            const item = document.createElement('div');
            item.className = 'picker-item';
            item.style.transform = `rotateY(${i * angleStep}deg) translateZ(100px)`;
            item.textContent = i === 0 ? "" : i - 1;
            wheel.appendChild(item);
        }

        // Функция обновления позиции
        function updateRotation(idx) {
            // Запрет возврата к пустому (индекс 0)
            if (isStarted && idx < 1) idx = 1;
            if (idx < 0) idx = 0;
            if (idx >= itemsCount) idx = itemsCount - 1;

            if (idx !== 0) isStarted = true;

            currentIdx = idx;
            currentRotation = -idx * angleStep;
            wheel.style.transform = `rotateY(${currentRotation}deg)`;
            resultDisplay.textContent = currentIdx === 0 ? "-" : currentIdx - 1;
        }

        // 1. Скролл мышкой
        window.addEventListener('wheel', (e) => {
            if (Math.abs(e.deltaY) < 5) return;
            const direction = e.deltaY > 0 ? 1 : -1;
            updateRotation(currentIdx + direction);
        }, { passive: false });

        // 2. Touch/Mouse события для перетаскивания
        let isDragging = false;

        const handleStart = (e) => {
            isDragging = true;
            startX = e.type.includes('touch') ? e.touches[0].clientX : e.clientX;
            wheel.style.transition = 'none'; // Убираем анимацию при движении пальцем
        };

        const handleMove = (e) => {
            if (!isDragging) return;
            const x = e.type.includes('touch') ? e.touches[0].clientX : e.clientX;
            const diff = x - startX;

            // Визуальный наклон при движении
            const moveAngle = currentRotation + (diff / 5);
            wheel.style.transform = `rotateY(${moveAngle}deg)`;
        };

        const handleEnd = (e) => {
            if (!isDragging) return;
            isDragging = false;
            wheel.style.transition = 'transform 0.3s ease-out';

            const endX = e.type.includes('touch') ? e.changedTouches[0].clientX : e.clientX;
            const diff = startX - endX;

            // Если сдвинули достаточно сильно — меняем индекс
            if (Math.abs(diff) > 20) {
                const direction = diff > 0 ? 1 : -1;
                updateRotation(currentIdx + direction);
            } else {
                updateRotation(currentIdx); // Возвращаем на место
            }
        };

        wheel.addEventListener('mousedown', handleStart);
        window.addEventListener('mousemove', handleMove);
        window.addEventListener('mouseup', handleEnd);

        wheel.addEventListener('touchstart', handleStart);
        window.addEventListener('touchmove', handleMove);
        window.addEventListener('touchend', handleEnd);
    </script>
</body>
</html>
